<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minor Project</title>
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <div class="container">
        <div class="loginBox">
            <form action="/server">
                <div class="logo">
                    <span>&#x1F4A7;</span>
                </div>
                <p class="webname">JAAL WATCH</p>
                <p class="status"><ul ><li>SYSTEM ONLINE</li></ul></p>

                <label for="id">OPERATOR ID</label>
                <input type="text" id="id" name="id" placeholder="Enter ID" required>

                <label for="password">ACCESS KEY</label>
                <input type="password" id="password" name="password" placeholder="XXXXXXXXX" required>
                
                <div class="checkbox">
                    <span><input type="checkbox" id="session" name="session"></span>
                    <span class="sessionlabel"><label for="session">Keep Session Active</label></span>
                    <span class="frgetpaswd"><a href="/">Forget Password?</a></span>
                </div>
                
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>

</html>
