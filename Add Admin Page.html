<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Admin | Jal Watch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2f7 0%, #b3e5fc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 30px 30px;
            padding-top: 10px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo-box img {
            width: 250px;
        }

        .tab-box {
            display: flex;
            margin-bottom: 25px;
            background: #f1f1f1;
            border-radius: 10px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border: none;
            background: transparent;
            font-weight: 600;
            color: #555;
            transition: 0.3s;
            border-radius: 8px;
        }

        .tab-btn.active {
            background: #00adef;
            color: #fff;
        }

        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #00adef;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            background: #00adef;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #008cc2;
            box-shadow: 0 5px 15px rgba(0, 173, 239, 0.3);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }

        .footer-text a {
            color: #00adef;
            text-decoration: none;
            font-weight: bold;
        }

        .input-group select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        .input-group select:focus {
            border-color: #00adef;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .input-group {
            flex: 1;
        }

        @media (max-width: 480px) {
            .row {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="logo-box">
            <img src="logo.png" alt="Jal Watch Logo">
        </div>
        <form>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your Name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" placeholder="Enter phone number" pattern="[0-9]{10}" required>
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Employee ID</label>
                <input type="text" name="emp_id" placeholder="Enter employee ID" required>
            </div>
            <div class="input-group">
                <label>Job Title</label>
                <input type="text" name="job_title" placeholder="e.g. Manager, Engineer" required>
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="action-btn">Add Admin</button>
        </form>
    </div>


</body>

</html>
